<!doctype html>
<html lang="{{ if .Site.LanguageCode }}{{ .Site.LanguageCode }}{{ else }}en{{ end }}">
    {{- partial "head.html" . -}}
    <body>
        <div class="page-frame">
            <div class="page-shell">
                {{- partial "header.html" . -}}
                <main class="site-main">
                    {{- block "main" . }}{{- end }}
                </main>
            </div>
        </div>
        {{- partial "footer.html" . -}}
    </body>
</html>
