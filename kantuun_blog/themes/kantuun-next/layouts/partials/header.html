<header class="site-header">
    <div class="site-identity">
        <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Params.header_title | default .Site.Title }}</a>
        {{ with .Site.Params.header_subtitle }}
            <p class="site-subtitle">{{ . }}</p>
        {{ end }}
    </div>
    {{ with .Site.Menus.main }}
        <nav class="site-nav" aria-label="Primary navigation">
            {{ $currentPage := $.Page }}
            {{ range . }}
                <a class="site-nav__link{{ if or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }} is-active{{ end }}" href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
        </nav>
    {{ end }}
</header>
