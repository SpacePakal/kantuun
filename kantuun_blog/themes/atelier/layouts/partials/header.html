<header class="site-header">
    <div class="site-header__inner">
        <a class="brand" href="{{ "/" | relURL }}">
            {{ .Site.Title }}
        </a>

        {{ with .Site.Menus.main }}
            <nav class="site-nav" aria-label="Primary navigation">
                {{ $currentPage := $.Page }}
                {{ range . }}
                    <a class="site-nav__link{{ if or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }} is-active{{ end }}" href="{{ .URL }}">{{ .Name }}</a>
                {{ end }}
            </nav>
        {{ end }}
    </div>
</header>
